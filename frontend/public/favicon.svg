<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Royal Blue Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <!-- Luxury Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <!-- Soft Drop Shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Shield (Royal Blue) -->
  <path d="M256 40 C 380 40, 440 80, 440 200 C 440 340, 320 440, 256 472 C 192 440, 72 340, 72 200 C 72 80, 132 40, 256 40 Z" 
        fill="url(#blueGrad)" 
        filter="url(#dropShadow)" />

  <!-- Inner Gold Shield Border -->
  <path d="M256 65 C 355 65, 410 97, 410 195 C 410 310, 310 395, 256 430 C 202 395, 102 310, 102 195 C 102 97, 157 65, 256 65 Z" 
        fill="none" 
        stroke="url(#goldGrad)" 
        stroke-width="8" 
        stroke-linecap="round" />

  <!-- Modern Luxury House Outline (Gold) -->
  <g transform="translate(146, 170)">
    <!-- Roof -->
    <path d="M110 10 L 210 90 L 180 90 L 110 34 L 40 90 L 10 90 Z" fill="url(#goldGrad)" />
    <!-- Chimney -->
    <rect x="160" y="35" width="20" height="35" fill="url(#goldGrad)" />
    <!-- House Body Pillars -->
    <rect x="40" y="100" width="20" height="70" fill="url(#goldGrad)" rx="2" />
    <rect x="160" y="100" width="20" height="70" fill="url(#goldGrad)" rx="2" />
    <!-- Center Doorway Arch -->
    <path d="M90 170 L 90 120 C 90 105, 130 105, 130 120 L 130 170 Z" fill="url(#goldGrad)" />
  </g>

  <!-- Crown / Royal Crest Emblem (Gold, Top Center) -->
  <path d="M220 145 L 235 125 L 256 140 L 277 125 L 292 145 Z" fill="url(#goldGrad)" />
  <circle cx="256" cy="115" r="7" fill="url(#goldGrad)" />
  <circle cx="220" cy="132" r="5" fill="url(#goldGrad)" />
  <circle cx="292" cy="132" r="5" fill="url(#goldGrad)" />
</svg>